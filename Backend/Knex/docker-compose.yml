version: '3.8'
services:
  app: 
    build: .
    container_name: escolar_app_novo
    restart: always
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${DB_NAME:-db_gestao_escolar}
    expose:
      - ${PORT:-3000}
    depends_on:
      - db
    networks:
      - app-network
  db:
    image: postgres:15
    container_name: escolar_pg_novo
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-db_gestao_escolar}
    ports:
      - "5433:5432"  # Agora o Docker ouve na 5433 e repassa para a 5432 interna
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
  nginx:
    image: nginx:latest
    container_name: escolar_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge